<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ensō Flow — Ship with Zen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  #gameCanvas {
    display: block;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
(function() {
  'use strict';

  // ─── Canvas Setup ───────────────────────────────────────────────────────────
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const BASE_W = 480;
  const BASE_H = 640;

  let scale = 1;

  function resize() {
    const wRatio = window.innerWidth / BASE_W;
    const hRatio = window.innerHeight / BASE_H;
    scale = Math.min(wRatio, hRatio);
    canvas.width = BASE_W * scale;
    canvas.height = BASE_H * scale;
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ─── Colour Palette ─────────────────────────────────────────────────────────
  const C = {
    bg:          '#0a0a0f',
    burgundy:    '#8B2252',
    burgundyDim: '#5a1636',
    mauve:       '#C4A6B5',
    cream:       '#F5E6D3',
    ink:         '#2C2C2C',
    zen_green:   '#7BA886',
    brush_black: '#1a1a1a',
    gold:        '#D4A843',
    goldDim:     '#8a6920',
    soft_white:  '#E8E0D8',
    dim:         '#6B6070',
    torii_dark:  '#1e0d15',
    torii_mid:   '#3d1a2b',
  };

  // ─── Employee Data ──────────────────────────────────────────────────────────
  const EMPLOYEES = [
    { name: 'Anatoliy',  role: 'Senior Dev',       tech: 'C# · React',          color: '#4EC9B0' },
    { name: 'Bent',      role: 'DevOps',            tech: 'C# · Azure',          color: '#569CD6' },
    { name: 'Christian', role: 'Senior Dev',        tech: 'Go · React',          color: '#00ADD8' },
    { name: 'Eivind',    role: 'Senior Dev',        tech: 'Rust · Python',       color: '#DEA584' },
    { name: 'Erlend',    role: 'Architect',         tech: 'C# · DevOps',         color: '#68217A' },
    { name: 'Espen',     role: 'Developer',         tech: 'C# · Azure',          color: '#0078D4' },
    { name: 'Evgeny',    role: 'Cloud Architect',   tech: 'Azure MVP',           color: '#00BCF2' },
    { name: 'Frederik',  role: 'Fullstack Dev',     tech: 'FP · Design',         color: '#E8A0B0' },
    { name: 'Gareth',    role: 'Senior Dev',        tech: 'C# · Security',       color: '#C586C0' },
    { name: 'Ingrid',    role: 'Senior Dev',        tech: 'Python · React',      color: '#3776AB' },
    { name: 'Louise',    role: 'Senior Dev',        tech: 'C# · .NET',           color: '#512BD4' },
    { name: 'Magnus T.', role: 'Senior Dev',        tech: 'C# · React',          color: '#61DAFB' },
    { name: 'Magnus W.', role: 'Developer',         tech: 'Java · Go',           color: '#B07219' },
    { name: 'Misha',     role: 'Senior Dev',        tech: '.NET · DevSecOps',    color: '#E44D26' },
    { name: 'Nicolai',   role: 'Senior Dev',        tech: 'C# · React',          color: '#764ABC' },
    { name: 'Oddbjørn',  role: 'Senior Dev',        tech: 'C# · Mobile',         color: '#3DDC84' },
    { name: 'Snorre',    role: 'CTO/Architect',     tech: 'C# · React',          color: '#F7DF1E' },
    { name: 'Steinar',   role: 'Cloud Architect',   tech: 'C# · F# · Azure',    color: '#378BBA' },
    { name: 'Steve',     role: 'Senior Dev',        tech: 'Java · Angular',      color: '#DD0031' },
    { name: 'Thomas',    role: 'Senior Dev',        tech: '.NET · Angular',      color: '#1572B6' },
    { name: 'Torbjørn',  role: 'AI Consultant',     tech: 'AI · Fullstack',      color: '#FF6F00' },
    { name: 'Torstein',  role: 'Tech Lead',         tech: '.NET · Go · Azure',   color: '#00ACD7' },
    { name: 'Trude',     role: 'Frontend Dev',      tech: 'A11y · React',        color: '#F06292' },
    { name: 'Øivind',    role: 'Senior Dev',        tech: 'C# · React · Azure',  color: '#FF9800' },
    { name: 'Johannes',  role: 'Architect',         tech: 'Enterprise Arch',     color: '#607D8B' },
    { name: 'Arlene',    role: 'Senior Advisor',    tech: 'Project Mgmt',        color: '#9C27B0' },
    { name: 'Håvard',    role: 'CEO',               tech: 'Business · BI',       color: '#D4A843' },
    { name: 'Inge',      role: 'Senior Consultant', tech: 'Agile · Scrum',       color: '#4CAF50' },
    { name: 'Mia',       role: 'COO',               tech: 'Sales · HR',          color: '#E91E63' },
  ];

  // ─── Audio ──────────────────────────────────────────────────────────────────
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let ac = null;

  function initAudio() {
    if (!ac) ac = new AudioCtx();
  }

  function playTone(freq, type, duration, gainVal, startDelay = 0) {
    if (!ac) return;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime + startDelay);
    gain.gain.setValueAtTime(gainVal, ac.currentTime + startDelay);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + startDelay + duration);
    osc.start(ac.currentTime + startDelay);
    osc.stop(ac.currentTime + startDelay + duration + 0.01);
  }

  // Zen wind-chime flap
  function sfxFlap() {
    initAudio();
    playTone(1047, 'sine', 0.18, 0.12);
    playTone(1319, 'sine', 0.14, 0.07, 0.05);
    playTone(784,  'sine', 0.22, 0.05, 0.02);
  }

  // Gentle ascending chime for score
  function sfxScore() {
    initAudio();
    playTone(523,  'sine', 0.12, 0.15);
    playTone(659,  'sine', 0.12, 0.15, 0.08);
    playTone(784,  'sine', 0.18, 0.12, 0.16);
  }

  // Somber, resonant death tone
  function sfxDie() {
    initAudio();
    playTone(220, 'sine',   0.6, 0.2);
    playTone(174, 'sine',   0.8, 0.15, 0.1);
    playTone(146, 'triangle', 1.0, 0.1, 0.25);
  }

  // Soft selection chime
  function sfxSelect() {
    initAudio();
    playTone(660, 'sine', 0.15, 0.1);
    playTone(880, 'sine', 0.15, 0.08, 0.08);
  }

  // ─── State Machine ──────────────────────────────────────────────────────────
  const STATE = { MENU: 'menu', SELECT: 'select', PLAYING: 'playing', DEAD: 'dead' };
  let state = STATE.MENU;

  // ─── Selected Character ──────────────────────────────────────────────────────
  let selectedEmployee = null;

  function getPlayerColor() {
    return selectedEmployee ? selectedEmployee.color : C.burgundy;
  }

  function getPlayerColorDim() {
    return selectedEmployee ? selectedEmployee.color + '88' : C.burgundyDim;
  }

  function getHiScore() {
    const key = selectedEmployee
      ? `enso_flow_hi_${selectedEmployee.name}`
      : 'enso_flow_hi';
    return parseInt(localStorage.getItem(key) || '0', 10);
  }

  function setHiScore(v) {
    const key = selectedEmployee
      ? `enso_flow_hi_${selectedEmployee.name}`
      : 'enso_flow_hi';
    localStorage.setItem(key, String(v));
  }

  // ─── Character Select State ──────────────────────────────────────────────────
  const CARD_W      = 100;
  const CARD_H      = 90;
  const CARD_COLS   = 4;
  const CARD_GAP_X  = 10;
  const CARD_GAP_Y  = 10;
  const SELECT_TOP  = TOP_BAR_H_VALUE();  // computed below after constants

  function TOP_BAR_H_VALUE() { return 32; }

  const GRID_LEFT = (BASE_W - (CARD_COLS * CARD_W + (CARD_COLS - 1) * CARD_GAP_X)) / 2;
  const GRID_TOP_OFFSET = 60; // offset from top bar for the grid start

  let selectScrollY   = 0;   // current scroll in pixels
  let selectHoverIdx  = -1;  // hovered card index
  let selectFocusIdx  = 0;   // keyboard focused card index
  let selectMouseX    = -1;
  let selectMouseY    = -1;

  // Total rows
  function totalRows() { return Math.ceil(EMPLOYEES.length / CARD_COLS); }

  // Visible grid area (in canvas coords)
  const GRID_AREA_TOP    = TOP_BAR_H_VALUE() + GRID_TOP_OFFSET;
  const GRID_AREA_BOTTOM = BASE_H - GROUND_H_VALUE() - 24;

  function GROUND_H_VALUE() { return 44; }

  function maxScrollY() {
    const totalH = totalRows() * (CARD_H + CARD_GAP_Y) - CARD_GAP_Y;
    const visibleH = GRID_AREA_BOTTOM - GRID_AREA_TOP;
    return Math.max(0, totalH - visibleH);
  }

  function cardRect(idx) {
    const col = idx % CARD_COLS;
    const row = Math.floor(idx / CARD_COLS);
    const x = GRID_LEFT + col * (CARD_W + CARD_GAP_X);
    const y = GRID_AREA_TOP + row * (CARD_H + CARD_GAP_Y) - selectScrollY;
    return { x, y, w: CARD_W, h: CARD_H };
  }

  // ─── Constants ──────────────────────────────────────────────────────────────
  const GRAVITY       = 1400;
  const FLAP_FORCE    = -420;
  const BASE_SPEED    = 160;
  const PIPE_WIDTH    = 58;
  const GAP_BASE      = 158;
  const GAP_MIN       = 108;
  const GROUND_H      = 44;
  const TOP_BAR_H     = 32;
  const PIPE_SPAWN_X  = BASE_W + 20;
  const PIPE_INTERVAL = 1.7;
  const SPEED_RAMP    = 8;

  // ─── Obstacle Labels ────────────────────────────────────────────────────────
  const LABELS = [
    'LEGACY MIGRATION', 'ARCHITECTURE REVIEW', 'CLOUD MIGRATION', 'SPRINT DEADLINE',
    'STAKEHOLDER MEETING', 'TECHNICAL DEBT', 'AZURE PIPELINE', '.NET UPGRADE',
    'REACT REFACTOR', 'MICROSERVICES', 'CODE REVIEW', 'PRODUCTION DEPLOY',
    'KUBERNETES CLUSTER', 'API GATEWAY', 'SECURITY AUDIT', 'RUST REWRITE',
  ];

  // ─── Game Over Messages ──────────────────────────────────────────────────────
  const ERRORS = [
    'Sprint Velocity: 0',
    'Budget Overrun Detected',
    'The client changed requirements... again',
    'Azure subscription expired',
    'Merge conflict in production',
    'The architect has left the building',
    'npm audit found 847 vulnerabilities',
    'Docker container escaped',
  ];

  // ─── Flash Messages ──────────────────────────────────────────────────────────
  const FLASH_MSGS = [
    '✓ Sprint Complete',
    '✓ Sprint Complete',
    '⛩ Architecture Approved',
    '✓ Client Satisfied',
    '✓ Sprint Complete',
  ];

  // ─── Zen calligraphy characters ─────────────────────────────────────────────
  const ZEN_CHARS = ['技', '道', '禅', '円', '心', '和', '力', '匠'];

  // ─── Sand ripple offset ──────────────────────────────────────────────────────
  let sandOffset = 0;

  // ─── Background drifting characters ─────────────────────────────────────────
  let bgZenChars, sakuraPetals;

  // ─── Game Objects ───────────────────────────────────────────────────────────
  let player, pipes, particles, trailParticles;
  let score, hiScore, pipeTimer, gameSpeed, flashMsg, flashTimer;
  let shakeAmt, shakeDur, shakeTmr;
  let bobPhase;
  let deadErrorMsg;
  let goldShimmer, goldShimmerTimer;

  // ─── Background init ─────────────────────────────────────────────────────────
  function initBg() {
    bgZenChars = [];
    for (let i = 0; i < 16; i++) {
      bgZenChars.push({
        char:  ZEN_CHARS[i % ZEN_CHARS.length],
        x:     Math.random() * BASE_W,
        y:     TOP_BAR_H + Math.random() * (BASE_H - GROUND_H - TOP_BAR_H),
        vy:    4 + Math.random() * 8,
        vx:    -6 + Math.random() * 12,
        alpha: 0.03 + Math.random() * 0.05,
        size:  18 + Math.random() * 28,
        rot:   (Math.random() - 0.5) * 0.3,
        rotV:  (Math.random() - 0.5) * 0.02,
      });
    }

    sakuraPetals = [];
    for (let i = 0; i < 18; i++) {
      spawnPetal(true);
    }
  }

  function spawnPetal(randomY) {
    sakuraPetals.push({
      x:    Math.random() * BASE_W,
      y:    randomY ? TOP_BAR_H + Math.random() * (BASE_H - GROUND_H - TOP_BAR_H) : TOP_BAR_H - 10,
      vx:   -18 - Math.random() * 22,
      vy:   8 + Math.random() * 12,
      rot:  Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 3,
      alpha: 0.15 + Math.random() * 0.25,
      size:  3 + Math.random() * 3,
      wobble: Math.random() * Math.PI * 2,
      wobbleV: 2 + Math.random() * 2,
    });
  }

  // ─── Reset ───────────────────────────────────────────────────────────────────
  function resetGame() {
    player = {
      x: 90,
      y: BASE_H / 2,
      vy: 0,
      r: 13,
      dead: false,
      inkTrail: [],
    };
    pipes = [];
    particles = [];
    trailParticles = [];
    score = 0;
    hiScore = getHiScore();
    pipeTimer = PIPE_INTERVAL * 0.5;
    gameSpeed = BASE_SPEED;
    flashMsg = '';
    flashTimer = 0;
    shakeAmt = 0;
    shakeDur = 0;
    shakeTmr = 0;
    bobPhase = 0;
    goldShimmer = false;
    goldShimmerTimer = 0;
    deadErrorMsg = ERRORS[Math.floor(Math.random() * ERRORS.length)];
    initBg();
  }

  resetGame();

  // ─── Input ──────────────────────────────────────────────────────────────────
  function handleInput() {
    if (state === STATE.MENU) {
      initAudio();
      state = STATE.SELECT;
      selectScrollY = 0;
      selectFocusIdx = 0;
      selectHoverIdx = -1;
    } else if (state === STATE.PLAYING) {
      flap();
    } else if (state === STATE.DEAD) {
      state = STATE.MENU;
    }
  }

  function confirmCharacterSelect(idx) {
    if (idx < 0 || idx >= EMPLOYEES.length) return;
    selectedEmployee = EMPLOYEES[idx];
    sfxSelect();
    state = STATE.PLAYING;
    resetGame();
    flap();
  }

  function flap() {
    if (state !== STATE.PLAYING) return;
    player.vy = FLAP_FORCE;
    sfxFlap();
    spawnInkSplatter();
  }

  document.addEventListener('keydown', e => {
    if (state === STATE.SELECT) {
      handleSelectKey(e);
      return;
    }
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      handleInput();
    }
  });

  function handleSelectKey(e) {
    e.preventDefault();
    const cols = CARD_COLS;
    if (e.code === 'ArrowRight') {
      selectFocusIdx = Math.min(EMPLOYEES.length - 1, selectFocusIdx + 1);
      scrollToCard(selectFocusIdx);
    } else if (e.code === 'ArrowLeft') {
      selectFocusIdx = Math.max(0, selectFocusIdx - 1);
      scrollToCard(selectFocusIdx);
    } else if (e.code === 'ArrowDown') {
      selectFocusIdx = Math.min(EMPLOYEES.length - 1, selectFocusIdx + cols);
      scrollToCard(selectFocusIdx);
    } else if (e.code === 'ArrowUp') {
      selectFocusIdx = Math.max(0, selectFocusIdx - cols);
      scrollToCard(selectFocusIdx);
    } else if (e.code === 'Enter' || e.code === 'Space') {
      confirmCharacterSelect(selectFocusIdx);
    } else if (e.code === 'Escape') {
      state = STATE.MENU;
    }
  }

  function scrollToCard(idx) {
    // Compute the card's y position in the unscrolled grid coordinate space
    const col = idx % CARD_COLS;
    const row = Math.floor(idx / CARD_COLS);
    const rawCardTop = GRID_AREA_TOP + row * (CARD_H + CARD_GAP_Y);
    const rawCardBot = rawCardTop + CARD_H;
    const visTop = GRID_AREA_TOP;
    const visBot = GRID_AREA_BOTTOM;
    if (rawCardBot - selectScrollY > visBot) {
      selectScrollY = Math.min(maxScrollY(), rawCardBot - visBot + CARD_GAP_Y);
    }
    if (rawCardTop - selectScrollY < visTop) {
      selectScrollY = Math.max(0, rawCardTop - visTop);
    }
  }

  canvas.addEventListener('click', e => {
    if (state === STATE.SELECT) {
      const cx = e.offsetX / scale;
      const cy = e.offsetY / scale;
      const idx = cardAtPoint(cx, cy);
      if (idx >= 0) {
        selectFocusIdx = idx;
        confirmCharacterSelect(idx);
      }
    } else {
      handleInput();
    }
  });

  canvas.addEventListener('mousemove', e => {
    selectMouseX = e.offsetX / scale;
    selectMouseY = e.offsetY / scale;
    if (state === STATE.SELECT) {
      selectHoverIdx = cardAtPoint(selectMouseX, selectMouseY);
    }
  });

  canvas.addEventListener('mouseleave', () => {
    selectHoverIdx = -1;
    selectMouseX = -1;
    selectMouseY = -1;
  });

  canvas.addEventListener('wheel', e => {
    if (state === STATE.SELECT) {
      e.preventDefault();
      selectScrollY = Math.max(0, Math.min(maxScrollY(), selectScrollY + e.deltaY * 0.5));
    }
  }, { passive: false });

  // Touch support for select screen
  let touchStartY = null;
  let touchScrollStart = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state === STATE.SELECT) {
      touchStartY = e.touches[0].clientY;
      touchScrollStart = selectScrollY;
    } else {
      handleInput();
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    if (state === STATE.SELECT && touchStartY !== null) {
      e.preventDefault();
      const dy = (touchStartY - e.touches[0].clientY) / scale;
      selectScrollY = Math.max(0, Math.min(maxScrollY(), touchScrollStart + dy));
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    if (state === STATE.SELECT) {
      e.preventDefault();
      // Only register as a tap if there was minimal scroll movement
      const dy = touchStartY !== null
        ? Math.abs(touchStartY - (e.changedTouches[0] ? e.changedTouches[0].clientY : touchStartY))
        : 999;
      if (dy < 8) {
        const touch = e.changedTouches[0];
        const rect  = canvas.getBoundingClientRect();
        const cx    = (touch.clientX - rect.left) / scale;
        const cy    = (touch.clientY - rect.top)  / scale;
        const idx   = cardAtPoint(cx, cy);
        if (idx >= 0) {
          selectFocusIdx = idx;
          confirmCharacterSelect(idx);
        }
      }
      touchStartY = null;
      touchScrollStart = null;
    }
  }, { passive: false });

  function cardAtPoint(px, py) {
    for (let i = 0; i < EMPLOYEES.length; i++) {
      const r = cardRect(i);
      if (r.y > GRID_AREA_BOTTOM || r.y + r.h < GRID_AREA_TOP) continue; // clipped
      if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) {
        return i;
      }
    }
    return -1;
  }

  // ─── Pipe Spawning ──────────────────────────────────────────────────────────
  function spawnPipe() {
    const gap = Math.max(GAP_MIN, GAP_BASE - score * 1.5);
    const topH = TOP_BAR_H + 30 + Math.random() * (BASE_H - GROUND_H - TOP_BAR_H - gap - 60);
    const label = LABELS[Math.floor(Math.random() * LABELS.length)];
    pipes.push({
      x: PIPE_SPAWN_X,
      topH,
      botY: topH + gap,
      botH: BASE_H - GROUND_H - (topH + gap),
      scored: false,
      label,
      phase: Math.random() * Math.PI * 2,
    });
  }

  // ─── Ink Splatter Trail ──────────────────────────────────────────────────────
  function spawnInkSplatter() {
    const col = getPlayerColor();
    for (let i = 0; i < 5; i++) {
      const angle = Math.PI + (Math.random() - 0.5) * 1.2;
      const speed = 40 + Math.random() * 80;
      trailParticles.push({
        x:     player.x + (Math.random() - 0.5) * 8,
        y:     player.y + (Math.random() - 0.5) * 8,
        vx:    Math.cos(angle) * speed,
        vy:    Math.sin(angle) * speed - 20,
        life:  1.0,
        decay: 1.2 + Math.random() * 0.8,
        r:     1.5 + Math.random() * 2.5,
        type:  'ink',
        color: Math.random() < 0.7 ? col : C.mauve,
      });
    }
  }

  function spawnFrameTrail() {
    if (Math.random() < 0.35) {
      trailParticles.push({
        x:     player.x - player.r + (Math.random() - 0.5) * 4,
        y:     player.y + (Math.random() - 0.5) * 6,
        vx:    -20 - Math.random() * 30,
        vy:    (Math.random() - 0.5) * 15,
        life:  1.0,
        decay: 1.8 + Math.random() * 1.0,
        r:     1 + Math.random() * 1.5,
        type:  'ink',
        color: getPlayerColor(),
      });
    }
  }

  // ─── Gold Shimmer Particles ──────────────────────────────────────────────────
  function spawnGoldShimmer(cx, cy) {
    for (let i = 0; i < 16; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 30 + Math.random() * 70;
      particles.push({
        x:     cx + (Math.random() - 0.5) * 20,
        y:     cy + (Math.random() - 0.5) * 20,
        vx:    Math.cos(angle) * speed,
        vy:    Math.sin(angle) * speed,
        life:  1.0,
        decay: 1.0 + Math.random() * 0.5,
        r:     1.5 + Math.random() * 2,
        type:  'gold',
        color: C.gold,
      });
    }
  }

  // ─── Death Explosion ─────────────────────────────────────────────────────────
  function spawnExplosion(x, y) {
    const col = getPlayerColor();
    for (let i = 0; i < 24; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 60 + Math.random() * 180;
      particles.push({
        x, y,
        vx:    Math.cos(angle) * speed,
        vy:    Math.sin(angle) * speed,
        life:  1.0,
        decay: 0.7 + Math.random() * 0.8,
        r:     2 + Math.random() * 3,
        type:  'burst',
        color: [col, C.mauve, C.cream, C.gold][Math.floor(Math.random() * 4)],
      });
    }
  }

  // ─── Shake ───────────────────────────────────────────────────────────────────
  function startShake(amt, dur) {
    shakeAmt = amt;
    shakeDur = dur;
    shakeTmr = 0;
  }

  // ─── Flash Message ───────────────────────────────────────────────────────────
  function showFlash(msg, duration) {
    flashMsg = msg;
    flashTimer = duration;
  }

  // ─── Update ──────────────────────────────────────────────────────────────────
  let lastTime = 0;

  function update(ts) {
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    updateBg(dt);

    if (state === STATE.PLAYING) {
      updatePlaying(dt);
    } else if (state === STATE.DEAD) {
      updateDead(dt);
    }

    updateParticles(dt);
    updateTrail(dt);

    if (flashTimer > 0) flashTimer -= dt;
    if (goldShimmerTimer > 0) goldShimmerTimer -= dt;
    if (shakeTmr < shakeDur) shakeTmr += dt;

    sandOffset = (sandOffset + gameSpeed * dt * 0.3) % 24;

    render();
    requestAnimationFrame(update);
  }

  function updateBg(dt) {
    bobPhase += dt * 2.2;

    for (const z of bgZenChars) {
      z.x  += z.vx * dt;
      z.y  += z.vy * dt;
      z.rot += z.rotV;
      if (z.y > BASE_H - GROUND_H + 20) {
        z.y = TOP_BAR_H - 20;
        z.x = Math.random() * BASE_W;
      }
      if (z.x < -30 || z.x > BASE_W + 30) {
        z.x = Math.random() * BASE_W;
        z.y = TOP_BAR_H + Math.random() * (BASE_H - GROUND_H - TOP_BAR_H);
      }
    }

    for (let i = sakuraPetals.length - 1; i >= 0; i--) {
      const p = sakuraPetals[i];
      p.wobble += p.wobbleV * dt;
      p.x += (p.vx + Math.sin(p.wobble) * 10) * dt;
      p.y += p.vy * dt;
      p.rot += p.rotV * dt;
      if (p.y > BASE_H - GROUND_H + 10 || p.x < -10) {
        sakuraPetals.splice(i, 1);
        spawnPetal(false);
      }
    }
  }

  function updatePlaying(dt) {
    player.vy += GRAVITY * dt;
    player.y  += player.vy * dt;

    if (player.vy < -80) spawnFrameTrail();

    pipeTimer -= dt;
    if (pipeTimer <= 0) {
      spawnPipe();
      pipeTimer = PIPE_INTERVAL;
    }

    for (const p of pipes) {
      p.x    -= gameSpeed * dt;
      p.phase += dt * 1.5;

      if (!p.scored && p.x + PIPE_WIDTH < player.x - player.r) {
        p.scored = true;
        score++;
        gameSpeed = BASE_SPEED + score * SPEED_RAMP;
        sfxScore();

        if (score % 10 === 0) {
          showFlash('🚀 Deployed to Azure', 2.2);
          goldShimmer = true;
          goldShimmerTimer = 1.0;
          spawnGoldShimmer(player.x, player.y);
        } else if (score % 5 === 0) {
          showFlash('⛩ Architecture Approved', 1.8);
          spawnGoldShimmer(player.x, player.y);
        } else {
          showFlash(FLASH_MSGS[score % FLASH_MSGS.length], 1.4);
        }

        if (score > hiScore) {
          hiScore = score;
          setHiScore(hiScore);
        }
      }
    }

    pipes = pipes.filter(p => p.x + PIPE_WIDTH > -10);

    if (player.y - player.r < TOP_BAR_H) {
      player.y = TOP_BAR_H + player.r;
      die();
      return;
    }
    if (player.y + player.r > BASE_H - GROUND_H) {
      player.y = BASE_H - GROUND_H - player.r;
      die();
      return;
    }

    for (const p of pipes) {
      const px = p.x, pw = PIPE_WIDTH;
      if (player.x + player.r > px && player.x - player.r < px + pw) {
        if (player.y - player.r < p.topH || player.y + player.r > p.botY) {
          die();
          return;
        }
      }
    }
  }

  function die() {
    state = STATE.DEAD;
    player.dead = true;
    spawnExplosion(player.x, player.y);
    startShake(7, 0.45);
    sfxDie();
    deadErrorMsg = ERRORS[Math.floor(Math.random() * ERRORS.length)];
  }

  function updateDead(dt) {
    player.vy += GRAVITY * dt;
    player.y  += player.vy * dt;
    if (player.y + player.r > BASE_H - GROUND_H) {
      player.y = BASE_H - GROUND_H - player.r;
      player.vy = 0;
    }
  }

  function updateParticles(dt) {
    for (const p of particles) {
      p.x    += p.vx * dt;
      p.y    += p.vy * dt;
      p.vy   += 400 * dt;
      p.life -= p.decay * dt;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function updateTrail(dt) {
    for (const t of trailParticles) {
      t.x    += t.vx * dt;
      t.y    += t.vy * dt;
      t.vy   += 200 * dt;
      t.life -= t.decay * dt;
    }
    trailParticles = trailParticles.filter(t => t.life > 0);
  }

  // ─── Render ──────────────────────────────────────────────────────────────────
  function render() {
    const shakeX = shakeTmr < shakeDur
      ? (Math.random() - 0.5) * shakeAmt * 2 * (1 - shakeTmr / shakeDur)
      : 0;
    const shakeY = shakeTmr < shakeDur
      ? (Math.random() - 0.5) * shakeAmt * (1 - shakeTmr / shakeDur)
      : 0;

    ctx.save();
    ctx.translate(shakeX, shakeY);

    drawBg();
    drawMistyMountains();
    drawZenChars();
    drawSakuraPetals();

    if (state === STATE.PLAYING || state === STATE.DEAD) {
      drawPipes();
      drawTrail();
      drawPlayer();
      drawParticles();
    }

    drawGround();
    drawTopBar();
    drawHUD();

    if (flashTimer > 0) drawFlash();

    if (state === STATE.MENU)   drawMenu();
    if (state === STATE.SELECT) drawCharacterSelect();
    if (state === STATE.DEAD)   drawDead();

    ctx.restore();
  }

  function drawBg() {
    // Deep dark background gradient
    const grad = ctx.createLinearGradient(0, 0, 0, BASE_H);
    grad.addColorStop(0,   '#07070c');
    grad.addColorStop(0.5, '#0d0a12');
    grad.addColorStop(1,   '#110c0e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, BASE_W, BASE_H);
  }

  // Layered misty mountain silhouettes
  function drawMistyMountains() {
    const layers = [
      { alpha: 0.08, yBase: BASE_H - GROUND_H - 20,  peaks: [[0,110],[60,60],[120,90],[180,40],[240,70],[300,30],[360,65],[420,50],[480,80]] },
      { alpha: 0.06, yBase: BASE_H - GROUND_H - 50,  peaks: [[0,80],[80,45],[160,70],[240,25],[320,55],[400,35],[480,60]] },
      { alpha: 0.04, yBase: BASE_H - GROUND_H - 90,  peaks: [[0,50],[100,20],[200,40],[300,15],[400,30],[480,45]] },
    ];

    for (const layer of layers) {
      ctx.globalAlpha = layer.alpha;
      ctx.fillStyle = C.mauve;
      ctx.beginPath();
      ctx.moveTo(0, layer.yBase);
      for (const [px, py] of layer.peaks) {
        ctx.lineTo(px, layer.yBase - py);
      }
      ctx.lineTo(BASE_W, layer.yBase);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawZenChars() {
    for (const z of bgZenChars) {
      ctx.save();
      ctx.globalAlpha = z.alpha;
      ctx.translate(z.x, z.y);
      ctx.rotate(z.rot);
      ctx.font = `${z.size}px serif`;
      ctx.fillStyle = C.mauve;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(z.char, 0, 0);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }

  function drawSakuraPetals() {
    for (const p of sakuraPetals) {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      // Draw a simple petal shape
      ctx.fillStyle = '#e8a0b0';
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // ─── Torii Gate Pipes ────────────────────────────────────────────────────────
  function drawPipes() {
    for (const p of pipes) {
      drawToriiGate(p);
    }
  }

  function drawToriiGate(p) {
    const x = p.x, w = PIPE_WIDTH;
    const cx = x + w / 2;

    // Top gate (hangs from top)
    drawGatePillar(x, TOP_BAR_H, w, p.topH - TOP_BAR_H, true, p.phase);

    // Bottom gate (rises from bottom)
    drawGatePillar(x, p.botY, w, p.botH, false, p.phase + 0.5);

    // Gap label — rotated, in the center
    if (p.botY - p.topH > 20) {
      ctx.save();
      ctx.font = 'bold 6.5px Georgia, serif';
      ctx.fillStyle = C.mauve;
      ctx.globalAlpha = 0.7;
      ctx.textAlign = 'center';
      const labelY = p.topH + (p.botY - p.topH) / 2;
      ctx.translate(cx, labelY);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText(p.label, 0, 0);
      ctx.restore();
      ctx.textAlign = 'left';
    }
  }

  function drawGatePillar(x, y, w, h, isTop, phase) {
    if (h <= 0) return;

    const cx = x + w / 2;
    const pillarW = 10;
    const lx = x + 8;
    const rx = x + w - 8 - pillarW;

    // Background fill — torii dark
    const bgGrad = ctx.createLinearGradient(x, 0, x + w, 0);
    bgGrad.addColorStop(0,   '#130810');
    bgGrad.addColorStop(0.5, '#1e0d15');
    bgGrad.addColorStop(1,   '#130810');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(x, y, w, h);

    // Left pillar
    drawPillar(lx, y, pillarW, h, isTop, phase);
    // Right pillar
    drawPillar(rx, y, pillarW, h, isTop, phase + 0.8);

    // Crossbars (kasagi / nuki) at open end
    const barY = isTop ? y + h - 4 : y;
    const barThick = 5;

    // Outer kasagi (top beam)
    const kasagiGrad = ctx.createLinearGradient(x, barY, x, barY + barThick);
    kasagiGrad.addColorStop(0, '#9e2a60');
    kasagiGrad.addColorStop(1, '#6b1840');
    ctx.fillStyle = kasagiGrad;

    // Bar extends slightly past pillars
    ctx.beginPath();
    ctx.rect(x - 3, isTop ? y + h - barThick - 3 : y + 1, w + 6, barThick);
    ctx.fill();

    // Nuki (lower beam)
    ctx.fillStyle = '#6b1840';
    ctx.fillRect(x + 4, isTop ? y + h - barThick - 10 : y + 8, w - 8, 3);

    // Glowing top edge accent
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.6 + 0.3 * Math.sin(phase);
    ctx.beginPath();
    ctx.moveTo(x - 3, isTop ? y + h - barThick - 3 : y + 1);
    ctx.lineTo(x + w + 3, isTop ? y + h - barThick - 3 : y + 1);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Border lines on pillars
    ctx.strokeStyle = '#5a1636';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x, y, w, h);
  }

  function drawPillar(px, py, pw, ph, isTop, phase) {
    // Pillar gradient
    const grad = ctx.createLinearGradient(px, 0, px + pw, 0);
    grad.addColorStop(0,    '#6b1840');
    grad.addColorStop(0.3,  '#9e2a60');
    grad.addColorStop(0.7,  '#9e2a60');
    grad.addColorStop(1,    '#5a1330');
    ctx.fillStyle = grad;
    ctx.fillRect(px, py, pw, ph);

    // Subtle vertical grain lines
    ctx.strokeStyle = '#7a1f4e';
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.4;
    for (let i = 2; i < pw - 2; i += 3) {
      ctx.beginPath();
      ctx.moveTo(px + i, py);
      ctx.lineTo(px + i, py + ph);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Small code glyphs on pillar
    const glyphCount = Math.floor(ph / 22);
    ctx.font = '7px monospace';
    ctx.fillStyle = C.burgundy;
    ctx.globalAlpha = 0.3;
    ctx.textAlign = 'center';
    const glyphs = ['</', '/>', '{}', '[];', '=>', '::'];
    for (let i = 0; i < glyphCount; i++) {
      const gy = isTop ? py + ph - 12 - i * 22 : py + 12 + i * 22;
      if (gy > py && gy < py + ph - 4) {
        ctx.fillText(glyphs[i % glyphs.length], px + pw / 2, gy);
      }
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // ─── Player: Ensō Circle ──────────────────────────────────────────────────────
  function drawPlayer() {
    const x = player.x;
    const bob = player.dead ? 0 : Math.sin(bobPhase) * 2.5;
    const y = player.y + bob;

    ctx.save();
    const tilt = player.dead
      ? Math.PI / 2
      : Math.max(-0.45, Math.min(0.75, player.vy / 520));
    ctx.translate(x, y);
    ctx.rotate(tilt);

    const r = player.r;

    // Outer glow
    if (!player.dead) {
      ctx.shadowColor = getPlayerColor();
      ctx.shadowBlur = 18;
    }

    // Draw ensō — brushstroke arc that doesn't quite close
    drawEnsoCircle(0, 0, r, player.dead, getPlayerColor());

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawEnsoCircle(cx, cy, r, broken, color) {
    const strokeColor = color || C.burgundy;

    // The ensō: a brushstroke circle, thick and slightly uneven
    const gapStart = broken ? -0.1 : 0.18;   // gap where brush lifts
    const gapEnd   = broken ? 2.8  : 0.42;
    const startAngle = gapEnd;
    const endAngle   = Math.PI * 2 + gapStart;

    // Outer stroke — thick, ink-like
    ctx.beginPath();
    ctx.arc(cx, cy, r + 1.5, startAngle, endAngle);
    ctx.strokeStyle = '#0a0008';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Main stroke — personal color brushstroke
    ctx.beginPath();
    ctx.arc(cx, cy, r, startAngle, endAngle);

    // Gradient along the stroke — lighter at ends, darker in middle
    const grad = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
    // Lighten and darken the color for gradient
    grad.addColorStop(0,   lightenColor(strokeColor, 30));
    grad.addColorStop(0.3, lightenColor(strokeColor, 10));
    grad.addColorStop(0.6, strokeColor);
    grad.addColorStop(1,   darkenColor(strokeColor, 20));
    ctx.strokeStyle = grad;
    ctx.lineWidth = broken ? 4 : 5;
    ctx.stroke();

    // Brush texture — a slightly thinner inner stroke for depth
    ctx.beginPath();
    ctx.arc(cx, cy, r - 1, startAngle + 0.1, endAngle - 0.1);
    ctx.strokeStyle = 'rgba(196, 166, 181, 0.18)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Brush start/end tips — tapered points
    if (!broken) {
      // Start tip
      const sx = cx + Math.cos(startAngle) * r;
      const sy = cy + Math.sin(startAngle) * r;
      ctx.beginPath();
      ctx.arc(sx, sy, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = lightenColor(strokeColor, 20);
      ctx.fill();

      // End tip
      const ex = cx + Math.cos(endAngle) * r;
      const ey = cy + Math.sin(endAngle) * r;
      ctx.beginPath();
      ctx.arc(ex, ey, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = strokeColor;
      ctx.fill();
    }

    // Inner void — empty center, zen emptiness
    if (!broken) {
      ctx.beginPath();
      ctx.arc(cx, cy, r - 6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(10, 10, 15, 0.0)';
      ctx.fill();
    }
  }

  // Color utilities for gradient variation
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return [r, g, b];
  }

  function lightenColor(hex, amount) {
    try {
      const [r, g, b] = hexToRgb(hex);
      return `rgb(${Math.min(255,r+amount)},${Math.min(255,g+amount)},${Math.min(255,b+amount)})`;
    } catch(e) { return hex; }
  }

  function darkenColor(hex, amount) {
    try {
      const [r, g, b] = hexToRgb(hex);
      return `rgb(${Math.max(0,r-amount)},${Math.max(0,g-amount)},${Math.max(0,b-amount)})`;
    } catch(e) { return hex; }
  }

  // ─── Ink Trail ───────────────────────────────────────────────────────────────
  function drawTrail() {
    for (const t of trailParticles) {
      ctx.save();
      ctx.globalAlpha = t.life * 0.75;
      ctx.fillStyle = t.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r * t.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ─── Particles ───────────────────────────────────────────────────────────────
  function drawParticles() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * Math.max(0, p.life), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ─── Ground: Karesansui Rock Garden ──────────────────────────────────────────
  function drawGround() {
    const y = BASE_H - GROUND_H;

    // Ground base
    const ggrad = ctx.createLinearGradient(0, y, 0, BASE_H);
    ggrad.addColorStop(0, '#1a1018');
    ggrad.addColorStop(1, '#0e0a0d');
    ctx.fillStyle = ggrad;
    ctx.fillRect(0, y, BASE_W, GROUND_H);

    // Top border — subtle burgundy line
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(BASE_W, y);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Raked sand ripple lines (karesansui)
    ctx.strokeStyle = '#2a1a24';
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.55;
    const rippleSpacing = 5;
    const rippleCount = Math.ceil(GROUND_H / rippleSpacing);
    for (let i = 0; i < rippleCount; i++) {
      const ry = y + 6 + i * rippleSpacing;
      ctx.beginPath();
      // Wavy rake lines with offset scroll
      for (let sx = 0; sx <= BASE_W; sx += 2) {
        const waveY = ry + Math.sin((sx + sandOffset * 3) / 18) * 1.2;
        if (sx === 0) ctx.moveTo(sx, waveY);
        else ctx.lineTo(sx, waveY);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Branding: "ensō.no" subtle text
    ctx.font = '9px Georgia, serif';
    ctx.fillStyle = C.dim;
    ctx.globalAlpha = 0.4;
    ctx.textAlign = 'center';
    ctx.fillText('ensō.no', BASE_W / 2, y + GROUND_H - 7);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // ─── Top Bar ──────────────────────────────────────────────────────────────────
  function drawTopBar() {
    // Dark bar
    const barGrad = ctx.createLinearGradient(0, 0, 0, TOP_BAR_H);
    barGrad.addColorStop(0, '#100810');
    barGrad.addColorStop(1, '#0d0610');
    ctx.fillStyle = barGrad;
    ctx.fillRect(0, 0, BASE_W, TOP_BAR_H);

    // Bottom border line
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.35;
    ctx.beginPath();
    ctx.moveTo(0, TOP_BAR_H);
    ctx.lineTo(BASE_W, TOP_BAR_H);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Ensō title
    ctx.font = 'bold 13px Georgia, serif';
    ctx.fillStyle = C.mauve;
    ctx.fillText('円', 10, TOP_BAR_H - 9);

    ctx.font = '11px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.globalAlpha = 0.85;
    ctx.fillText('Ensō Flow', 30, TOP_BAR_H - 9);
    ctx.globalAlpha = 1;

    // Tech stack subtle tags
    const tags = ['C#', '.NET', 'React', 'Azure'];
    let tx = BASE_W - 8;
    ctx.font = '8px Georgia, serif';
    for (let i = tags.length - 1; i >= 0; i--) {
      const tw = ctx.measureText(tags[i]).width;
      tx -= tw + 2;
      ctx.fillStyle = C.dim;
      ctx.globalAlpha = 0.5;
      ctx.fillText(tags[i], tx, TOP_BAR_H - 10);
      ctx.globalAlpha = 1;
      if (i > 0) {
        tx -= 8;
        ctx.fillStyle = C.burgundy;
        ctx.globalAlpha = 0.3;
        ctx.fillText('|', tx, TOP_BAR_H - 10);
        ctx.globalAlpha = 1;
        tx -= 2;
      }
    }
  }

  // ─── HUD ──────────────────────────────────────────────────────────────────────
  function drawHUD() {
    if (state === STATE.MENU || state === STATE.SELECT) return;

    // Score
    ctx.font = 'bold 16px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.shadowColor = getPlayerColor();
    ctx.shadowBlur = goldShimmerTimer > 0 ? 14 : 5;
    ctx.fillText(`Sprints: ${score}`, 10, TOP_BAR_H + 22);
    ctx.shadowBlur = 0;

    // Hi score
    ctx.font = '10px Georgia, serif';
    ctx.fillStyle = C.dim;
    ctx.fillText(`Best: ${hiScore}`, 10, TOP_BAR_H + 36);

    // Consultant name
    if (selectedEmployee) {
      ctx.font = '9px Georgia, serif';
      ctx.fillStyle = selectedEmployee.color;
      ctx.globalAlpha = 0.75;
      ctx.fillText(`Consultant: ${selectedEmployee.name}`, 10, TOP_BAR_H + 50);
      ctx.globalAlpha = 1;
    }
  }

  // ─── Flash Message ────────────────────────────────────────────────────────────
  function drawFlash() {
    if (flashTimer <= 0) return;
    const alpha = Math.min(1, flashTimer * 2.5);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 13px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = goldShimmerTimer > 0 ? C.gold : C.zen_green;
    ctx.shadowColor = goldShimmerTimer > 0 ? C.gold : C.zen_green;
    ctx.shadowBlur = 14;
    ctx.fillText(flashMsg, BASE_W / 2, TOP_BAR_H + 65);
    ctx.shadowBlur = 0;
    ctx.restore();
    ctx.textAlign = 'left';
  }

  // ─── Menu Screen ──────────────────────────────────────────────────────────────
  function drawMenu() {
    // Soft overlay
    ctx.fillStyle = 'rgba(7, 5, 10, 0.72)';
    ctx.fillRect(0, TOP_BAR_H, BASE_W, BASE_H - TOP_BAR_H - GROUND_H);

    const cx = BASE_W / 2;
    const cy = BASE_H / 2;

    ctx.textAlign = 'center';

    // Large ensō circle as centrepiece
    ctx.save();
    ctx.translate(cx, cy - 95);
    const menuR = 52;

    // Outer glow ring
    ctx.shadowColor = C.burgundy;
    ctx.shadowBlur = 30;
    drawEnsoCircle(0, 0, menuR, false, C.burgundy);
    ctx.shadowBlur = 0;

    // Inner 円 character
    ctx.font = '28px serif';
    ctx.fillStyle = C.mauve;
    ctx.globalAlpha = 0.55;
    ctx.textBaseline = 'middle';
    ctx.fillText('円', 0, 2);
    ctx.textBaseline = 'alphabetic';
    ctx.globalAlpha = 1;
    ctx.restore();

    // Title
    ctx.font = 'bold 32px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.shadowColor = C.burgundy;
    ctx.shadowBlur = 16;
    ctx.fillText('Ensō Flow', cx, cy + 10);
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.font = '11px Georgia, serif';
    ctx.fillStyle = C.mauve;
    ctx.globalAlpha = 0.8;
    ctx.fillText('Navigate the path of software craftsmanship', cx, cy + 30);
    ctx.globalAlpha = 1;

    // Decorative divider
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.35;
    ctx.beginPath();
    ctx.moveTo(cx - 120, cy + 44);
    ctx.lineTo(cx + 120, cy + 44);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Description lines
    const descLines = [
      { text: 'Guide the Ensō circle through consulting challenges', color: C.dim },
      { text: 'Flap to stay airborne. Touch or press Space.', color: C.dim },
    ];
    let ly = cy + 62;
    for (const l of descLines) {
      ctx.font = '10px Georgia, serif';
      ctx.fillStyle = l.color;
      ctx.globalAlpha = 0.75;
      ctx.fillText(l.text, cx, ly);
      ly += 16;
      ctx.globalAlpha = 1;
    }

    // Pulsing start prompt
    const pulse = 0.55 + 0.45 * Math.sin(Date.now() / 520);
    ctx.globalAlpha = pulse;
    ctx.font = 'bold 14px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.shadowColor = C.mauve;
    ctx.shadowBlur = 10;
    ctx.fillText('— Choose your consultant —', cx, cy + 108);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // Hi score
    const hi = getHiScore();
    if (hi > 0) {
      ctx.font = '10px Georgia, serif';
      ctx.fillStyle = C.dim;
      ctx.globalAlpha = 0.6;
      ctx.fillText(`Personal best: ${hi} sprints delivered`, cx, cy + 132);
      ctx.globalAlpha = 1;
    }

    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }

  // ─── Character Select Screen ─────────────────────────────────────────────────
  function drawCharacterSelect() {
    // Dim overlay over the background
    ctx.fillStyle = 'rgba(7, 5, 10, 0.82)';
    ctx.fillRect(0, TOP_BAR_H, BASE_W, BASE_H - TOP_BAR_H - GROUND_H);

    const cx = BASE_W / 2;

    ctx.textAlign = 'center';

    // Header
    ctx.font = 'bold 15px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.shadowColor = C.burgundy;
    ctx.shadowBlur = 10;
    ctx.fillText('Choose Your Consultant', cx, TOP_BAR_H + 22);
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.font = '9px Georgia, serif';
    ctx.fillStyle = C.dim;
    ctx.globalAlpha = 0.7;
    ctx.fillText('Arrow keys · Scroll · Tap to select', cx, TOP_BAR_H + 36);
    ctx.globalAlpha = 1;

    // Clip grid to visible area
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, GRID_AREA_TOP, BASE_W, GRID_AREA_BOTTOM - GRID_AREA_TOP);
    ctx.clip();

    for (let i = 0; i < EMPLOYEES.length; i++) {
      const emp = EMPLOYEES[i];
      const rect = cardRect(i);

      // Skip cards fully outside visible region
      if (rect.y + rect.h < GRID_AREA_TOP || rect.y > GRID_AREA_BOTTOM) continue;

      const isHovered  = i === selectHoverIdx;
      const isFocused  = i === selectFocusIdx;
      const isActive   = isHovered || isFocused;

      drawEmployeeCard(emp, rect.x, rect.y, rect.w, rect.h, isActive, isFocused);
    }

    ctx.restore();

    // Scroll indicators
    drawScrollIndicators();

    ctx.textAlign = 'left';
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawEmployeeCard(emp, x, y, w, h, isActive, isFocused) {
    const color = emp.color;

    // Card background
    const bgAlpha = isActive ? 0.22 : 0.10;
    ctx.fillStyle = `rgba(20,14,22,${bgAlpha})`;
    roundRect(x, y, w, h, 6);
    ctx.fill();

    // Border glow
    const borderAlpha = isFocused ? 0.95 : (isActive ? 0.7 : 0.22);
    const borderWidth = isFocused ? 1.5 : (isActive ? 1.2 : 0.7);
    ctx.strokeStyle = color;
    ctx.lineWidth = borderWidth;
    ctx.globalAlpha = borderAlpha;
    roundRect(x, y, w, h, 6);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Outer glow for active cards
    if (isActive) {
      ctx.shadowColor = color;
      ctx.shadowBlur = isFocused ? 14 : 8;
      ctx.strokeStyle = color;
      ctx.lineWidth = borderWidth;
      ctx.globalAlpha = 0.3;
      roundRect(x, y, w, h, 6);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    // Mini ensō circle
    const ensoR = 12;
    const ensoX = x + w / 2;
    const ensoY = y + 20;

    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = isActive ? 10 : 5;
    drawEnsoCircle(ensoX, ensoY, ensoR, false, color);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Name
    ctx.font = `bold 8px Georgia, serif`;
    ctx.fillStyle = C.cream;
    ctx.textAlign = 'center';
    ctx.globalAlpha = isActive ? 1.0 : 0.88;
    ctx.fillText(emp.name, x + w / 2, ensoY + ensoR + 12);
    ctx.globalAlpha = 1;

    // Role
    ctx.font = '7px Georgia, serif';
    ctx.fillStyle = color;
    ctx.globalAlpha = isActive ? 0.9 : 0.65;
    ctx.fillText(emp.role, x + w / 2, ensoY + ensoR + 23);
    ctx.globalAlpha = 1;

    // Tech
    ctx.font = '6.5px Georgia, serif';
    ctx.fillStyle = C.dim;
    ctx.globalAlpha = isActive ? 0.8 : 0.5;
    ctx.fillText(emp.tech, x + w / 2, ensoY + ensoR + 34);
    ctx.globalAlpha = 1;

    ctx.textAlign = 'left';
  }

  function drawScrollIndicators() {
    const cx = BASE_W / 2;
    const canScrollUp   = selectScrollY > 0;
    const canScrollDown = selectScrollY < maxScrollY();

    if (canScrollUp) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = '10px Georgia, serif';
      ctx.fillStyle = C.mauve;
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
      ctx.globalAlpha = 0.4 + 0.4 * pulse;
      ctx.fillText('▲', cx, GRID_AREA_TOP + 10);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    if (canScrollDown) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = '10px Georgia, serif';
      ctx.fillStyle = C.mauve;
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
      ctx.globalAlpha = 0.4 + 0.4 * pulse;
      ctx.fillText('▼', cx, GRID_AREA_BOTTOM + 14);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // ─── Death Screen ─────────────────────────────────────────────────────────────
  function drawDead() {
    // Dark overlay with slight burgundy tint
    ctx.fillStyle = 'rgba(8, 2, 6, 0.82)';
    ctx.fillRect(0, TOP_BAR_H, BASE_W, BASE_H - TOP_BAR_H - GROUND_H);

    const cx = BASE_W / 2;
    const cy = BASE_H / 2 - 15;

    ctx.textAlign = 'center';

    // Broken ensō — large, incomplete, in player color
    ctx.save();
    ctx.translate(cx, cy - 88);
    ctx.shadowColor = getPlayerColor();
    ctx.shadowBlur = 20;
    drawEnsoCircle(0, 0, 42, true, getPlayerColor());
    ctx.shadowBlur = 0;
    ctx.restore();

    // "Sprint Retrospective" header — personalised if character selected
    const retroTitle = selectedEmployee
      ? `${selectedEmployee.name}'s Sprint Retrospective`
      : 'Sprint Retrospective';
    ctx.font = 'bold 13px Georgia, serif';
    ctx.fillStyle = C.mauve;
    ctx.shadowColor = C.burgundy;
    ctx.shadowBlur = 8;
    ctx.fillText(retroTitle, cx, cy - 30);
    ctx.shadowBlur = 0;

    // Error message box
    const bx = cx - 160, by = cy - 22, bw = 320, bh = 44;
    ctx.fillStyle = 'rgba(139, 34, 82, 0.08)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.4;
    ctx.strokeRect(bx, by, bw, bh);
    ctx.globalAlpha = 1;

    ctx.font = '10px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.globalAlpha = 0.8;
    const errLines = wrapText(deadErrorMsg, 46);
    for (let i = 0; i < errLines.length; i++) {
      ctx.fillText(errLines[i], cx, by + 16 + i * 14);
    }
    ctx.globalAlpha = 1;

    // Divider
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 0.6;
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.moveTo(cx - 100, cy + 30);
    ctx.lineTo(cx + 100, cy + 30);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Sprint metrics
    ctx.font = 'bold 12px Georgia, serif';
    ctx.fillStyle = C.soft_white;
    ctx.fillText(`Sprints Delivered:  ${score}`, cx, cy + 48);
    ctx.fillStyle = C.gold;
    ctx.fillText(`Personal Best:      ${hiScore}`, cx, cy + 66);

    // New record
    if (score >= hiScore && score > 0) {
      ctx.font = 'bold 11px Georgia, serif';
      ctx.fillStyle = C.gold;
      ctx.shadowColor = C.gold;
      ctx.shadowBlur = 8;
      ctx.fillText('✦ New Personal Best ✦', cx, cy + 88);
      ctx.shadowBlur = 0;
    }

    // Restart prompt
    const pulse = 0.65 + 0.35 * Math.sin(Date.now() / 450);
    ctx.globalAlpha = pulse;
    ctx.font = 'bold 13px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.shadowColor = C.mauve;
    ctx.shadowBlur = 8;
    ctx.fillText('— Return to Stillness —', cx, cy + 120);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    ctx.font = '9px Georgia, serif';
    ctx.fillStyle = C.dim;
    ctx.globalAlpha = 0.6;
    ctx.fillText('press Space or tap to continue', cx, cy + 138);
    ctx.globalAlpha = 1;

    ctx.textAlign = 'left';
  }

  function wrapText(text, maxChars) {
    const words = text.split(' ');
    const lines = [];
    let current = '';
    for (const word of words) {
      if ((current + ' ' + word).trim().length > maxChars) {
        lines.push(current.trim());
        current = word;
      } else {
        current = (current + ' ' + word).trim();
      }
    }
    if (current) lines.push(current);
    return lines;
  }

  // ─── Start ───────────────────────────────────────────────────────────────────
  requestAnimationFrame(ts => {
    lastTime = ts;
    requestAnimationFrame(update);
  });

})();
</script>
</body>
