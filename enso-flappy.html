  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let ac = null;

  function initAudio() {
    if (!ac) ac = new AudioCtx();
  }

  function playTone(freq, type, duration, gainVal, startDelay = 0) {
    if (!ac) return;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime + startDelay);
    gain.gain.setValueAtTime(gainVal, ac.currentTime + startDelay);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + startDelay + duration);
    osc.start(ac.currentTime + startDelay);
    osc.stop(ac.currentTime + startDelay + duration + 0.01);
  }

      vy:   8 + Math.random() * 12,
      rot:  Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 3,
      alpha: 0.15 + Math.random() * 0.25,
      size:  3 + Math.random() * 3,
      wobble: Math.random() * Math.PI * 2,
      wobbleV: 2 + Math.random() * 2,
    });
  }

  // ─── Reset ───────────────────────────────────────────────────────────────────
  function resetGame() {
    player = {
      x: 90,
      y: BASE_H / 2,
      vy: 0,
      r: 13,
      dead: false,
      inkTrail: [],
    };
    pipes = [];
    particles = [];
    trailParticles = [];
    score = 0;
    hiScore = getHiScore();
    pipeTimer = PIPE_INTERVAL * 0.5;
    gameSpeed = BASE_SPEED;
    flashMsg = '';
    flashTimer = 0;
    shakeAmt = 0;
    shakeDur = 0;
    shakeTmr = 0;
    bobPhase = 0;
    goldShimmer = false;
    goldShimmerTimer = 0;
    neuralDodgeTimer = 0;
    deadErrorMsg = ERRORS[Math.floor(Math.random() * ERRORS.length)];
    initBg();
  }

  resetGame();

  // ─── Input ──────────────────────────────────────────────────────────────────
  function handleInput() {
    if (state === STATE.MENU) {
      initAudio();
      state = STATE.SELECT;
      selectScrollY = 0;
      selectFocusIdx = 0;
      selectHoverIdx = -1;
    } else if (state === STATE.PLAYING) {
      flap();
    } else if (state === STATE.DEAD) {
      state = STATE.MENU;
    }
  }

  function confirmCharacterSelect(idx) {
    if (idx < 0 || idx >= EMPLOYEES.length) return;
    selectedEmployee = EMPLOYEES[idx];
    sfxSelect();
    state = STATE.PLAYING;
    resetGame();
    flap();
  }

  function flap() {
    if (state !== STATE.PLAYING) return;
    player.vy = FLAP_FORCE * getMods().flapMul;
    sfxFlap();
    spawnInkSplatter();
  }

  document.addEventListener('keydown', e => {
    if (state === STATE.SELECT) {
      handleSelectKey(e);
      return;
    }
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      handleInput();
    }
  });

  function handleSelectKey(e) {
    e.preventDefault();
    const cols = CARD_COLS;
    if (e.code === 'ArrowRight') {
      selectFocusIdx = Math.min(EMPLOYEES.length - 1, selectFocusIdx + 1);
      scrollToCard(selectFocusIdx);
    } else if (e.code === 'ArrowLeft') {
      selectFocusIdx = Math.max(0, selectFocusIdx - 1);
      scrollToCard(selectFocusIdx);
    } else if (e.code === 'ArrowDown') {
      selectFocusIdx = Math.min(EMPLOYEES.length - 1, selectFocusIdx + cols);
      scrollToCard(selectFocusIdx);
    } else if (e.code === 'ArrowUp') {
      selectFocusIdx = Math.max(0, selectFocusIdx - cols);
      scrollToCard(selectFocusIdx);
    } else if (e.code === 'Enter' || e.code === 'Space') {
      confirmCharacterSelect(selectFocusIdx);
    } else if (e.code === 'Escape') {
      state = STATE.MENU;
    }
  }

  function scrollToCard(idx) {
    // Compute the card's y position in the unscrolled grid coordinate space
    const col = idx % CARD_COLS;
    const row = Math.floor(idx / CARD_COLS);
    const rawCardTop = GRID_AREA_TOP + row * (CARD_H + CARD_GAP_Y);
    const rawCardBot = rawCardTop + CARD_H;
    const visTop = GRID_AREA_TOP;
    const visBot = GRID_AREA_BOTTOM;
    if (rawCardBot - selectScrollY > visBot) {
      selectScrollY = Math.min(maxScrollY(), rawCardBot - visBot + CARD_GAP_Y);
    }
    if (rawCardTop - selectScrollY < visTop) {
      selectScrollY = Math.max(0, rawCardTop - visTop);
    }
  }

  canvas.addEventListener('click', e => {
    if (state === STATE.SELECT) {
      const cx = e.offsetX / scale;
      const cy = e.offsetY / scale;
      const idx = cardAtPoint(cx, cy);
      if (idx >= 0) {
        selectFocusIdx = idx;
        confirmCharacterSelect(idx);
      }
    } else {
      handleInput();
    }
  });

  canvas.addEventListener('mousemove', e => {
    selectMouseX = e.offsetX / scale;
    selectMouseY = e.offsetY / scale;
    if (state === STATE.SELECT) {
      selectHoverIdx = cardAtPoint(selectMouseX, selectMouseY);
    }
  });

  canvas.addEventListener('mouseleave', () => {
    selectHoverIdx = -1;
    selectMouseX = -1;
    selectMouseY = -1;
  });

  canvas.addEventListener('wheel', e => {
    if (state === STATE.SELECT) {
      e.preventDefault();
      selectScrollY = Math.max(0, Math.min(maxScrollY(), selectScrollY + e.deltaY * 0.5));
    }
  }, { passive: false });

  // Touch support for select screen
  let touchStartY = null;
  let touchScrollStart = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state === STATE.SELECT) {
      touchStartY = e.touches[0].clientY;
      touchScrollStart = selectScrollY;
    } else {
      handleInput();
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    if (state === STATE.SELECT && touchStartY !== null) {
      e.preventDefault();
      const dy = (touchStartY - e.touches[0].clientY) / scale;
      selectScrollY = Math.max(0, Math.min(maxScrollY(), touchScrollStart + dy));
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    if (state === STATE.SELECT) {
      e.preventDefault();
      // Only register as a tap if there was minimal scroll movement
      const dy = touchStartY !== null
        ? Math.abs(touchStartY - (e.changedTouches[0] ? e.changedTouches[0].clientY : touchStartY))
        : 999;
      if (dy < 8) {
        const touch = e.changedTouches[0];
        const rect  = canvas.getBoundingClientRect();
        const cx    = (touch.clientX - rect.left) / scale;
        const cy    = (touch.clientY - rect.top)  / scale;
        const idx   = cardAtPoint(cx, cy);
        if (idx >= 0) {
          selectFocusIdx = idx;
          confirmCharacterSelect(idx);
        }
      }
      touchStartY = null;
      touchScrollStart = null;
    }
  }, { passive: false });

  function cardAtPoint(px, py) {
    for (let i = 0; i < EMPLOYEES.length; i++) {
      const r = cardRect(i);
      if (r.y > GRID_AREA_BOTTOM || r.y + r.h < GRID_AREA_TOP) continue; // clipped
      if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) {
        return i;
      }
    }
    return -1;
  }

  // ─── Pipe Spawning ──────────────────────────────────────────────────────────
  function spawnPipe() {
    const gapBonus = getMods().gapBonus;
    const gap = Math.max(GAP_MIN + gapBonus, GAP_BASE + gapBonus - score * 1.5);
    const topH = TOP_BAR_H + 30 + Math.random() * (BASE_H - GROUND_H - TOP_BAR_H - gap - 60);
    const label = LABELS[Math.floor(Math.random() * LABELS.length)];
    pipes.push({
      x: PIPE_SPAWN_X,
      topH,
      botY: topH + gap,
      botH: BASE_H - GROUND_H - (topH + gap),
      scored: false,
      dodged: false,
      label,
      phase: Math.random() * Math.PI * 2,
    });
  }

  // ─── Ink Splatter Trail ──────────────────────────────────────────────────────
  function spawnInkSplatter() {
    const col = getPlayerColor();
    for (let i = 0; i < 5; i++) {
      const angle = Math.PI + (Math.random() - 0.5) * 1.2;
      const speed = 40 + Math.random() * 80;
      trailParticles.push({
        x:     player.x + (Math.random() - 0.5) * 8,
        y:     player.y + (Math.random() - 0.5) * 8,
        vx:    Math.cos(angle) * speed,
        vy:    Math.sin(angle) * speed - 20,
        life:  1.0,
        decay: 1.2 + Math.random() * 0.8,
        r:     1.5 + Math.random() * 2.5,
        type:  'ink',
        color: Math.random() < 0.7 ? col : C.mauve,
      });
    }
  }

  function spawnFrameTrail() {
    if (Math.random() < 0.35) {
      trailParticles.push({
        x:     player.x - player.r + (Math.random() - 0.5) * 4,
        y:     player.y + (Math.random() - 0.5) * 6,
        vx:    -20 - Math.random() * 30,
        vy:    (Math.random() - 0.5) * 15,
        life:  1.0,
        decay: 1.8 + Math.random() * 1.0,
        r:     1 + Math.random() * 1.5,
        type:  'ink',
        color: getPlayerColor(),
      });
    }
  }

  // ─── Gold Shimmer Particles ──────────────────────────────────────────────────
  function spawnGoldShimmer(cx, cy) {
    for (let i = 0; i < 16; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 30 + Math.random() * 70;
      particles.push({
        x:     cx + (Math.random() - 0.5) * 20,
        y:     cy + (Math.random() - 0.5) * 20,
        vx:    Math.cos(angle) * speed,
        vy:    Math.sin(angle) * speed,
        life:  1.0,
        decay: 1.0 + Math.random() * 0.5,
        r:     1.5 + Math.random() * 2,
        type:  'gold',
        color: C.gold,
      });
    }
  }

  // ─── Death Explosion ─────────────────────────────────────────────────────────
  function spawnExplosion(x, y) {
    const col = getPlayerColor();
    for (let i = 0; i < 24; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 60 + Math.random() * 180;
      particles.push({
        x, y,
        vx:    Math.cos(angle) * speed,
        vy:    Math.sin(angle) * speed,
        life:  1.0,
        decay: 0.7 + Math.random() * 0.8,
        r:     2 + Math.random() * 3,
        type:  'burst',
        color: [col, C.mauve, C.cream, C.gold][Math.floor(Math.random() * 4)],
      });
    }
  }

  // ─── Neural Dodge Particles ───────────────────────────────────────────────────
  function spawnNeuralDodgeParticles() {
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 100;
      particles.push({
        x:     player.x + (Math.random() - 0.5) * 16,
        y:     player.y + (Math.random() - 0.5) * 16,
        vx:    Math.cos(angle) * speed,
        vy:    Math.sin(angle) * speed - 30,
        life:  1.0,
        decay: 1.2 + Math.random() * 0.6,
        r:     1.5 + Math.random() * 2.5,
        type:  'neural',
        color: ['#00BCF2', '#7df5ff', '#ffffff', '#FF6F00'][Math.floor(Math.random() * 4)],
      });
    }
  }

  // ─── Shake ───────────────────────────────────────────────────────────────────
  function startShake(amt, dur) {
    shakeAmt = amt;
    shakeDur = dur;
    shakeTmr = 0;
  }

  // ─── Flash Message ───────────────────────────────────────────────────────────
  function showFlash(msg, duration) {
    flashMsg = msg;
    flashTimer = duration;
  }

  // ─── Update ──────────────────────────────────────────────────────────────────
  let lastTime = 0;

  function update(ts) {
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    updateBg(dt);

    if (state === STATE.PLAYING) {
      updatePlaying(dt);
    } else if (state === STATE.DEAD) {
      updateDead(dt);
    }

    updateParticles(dt);
    updateTrail(dt);

    if (flashTimer > 0) flashTimer -= dt;
    if (goldShimmerTimer > 0) goldShimmerTimer -= dt;
    if (neuralDodgeTimer > 0) neuralDodgeTimer -= dt;
    if (shakeTmr < shakeDur) shakeTmr += dt;

    sandOffset = (sandOffset + gameSpeed * dt * 0.3) % 24;

    render();
    requestAnimationFrame(update);
  }

  function updateBg(dt) {
    bobPhase += dt * 2.2;

    for (const z of bgZenChars) {
      z.x  += z.vx * dt;
      z.y  += z.vy * dt;
      z.rot += z.rotV;
      if (z.y > BASE_H - GROUND_H + 20) {
        z.y = TOP_BAR_H - 20;
        z.x = Math.random() * BASE_W;
      }
      if (z.x < -30 || z.x > BASE_W + 30) {
        z.x = Math.random() * BASE_W;
        z.y = TOP_BAR_H + Math.random() * (BASE_H - GROUND_H - TOP_BAR_H);
      }
    }

    for (let i = sakuraPetals.length - 1; i >= 0; i--) {
      const p = sakuraPetals[i];
      p.wobble += p.wobbleV * dt;
      p.x += (p.vx + Math.sin(p.wobble) * 10) * dt;
      p.y += p.vy * dt;
      p.rot += p.rotV * dt;
      if (p.y > BASE_H - GROUND_H + 10 || p.x < -10) {
        sakuraPetals.splice(i, 1);
        spawnPetal(false);
      }
    }
  }

  function updatePlaying(dt) {
    const mods = getMods();

    player.vy += GRAVITY * mods.gravityMul * dt;
    player.y  += player.vy * dt;

    if (player.vy < -80) spawnFrameTrail();

    pipeTimer -= dt;
    if (pipeTimer <= 0) {
      spawnPipe();
      pipeTimer = PIPE_INTERVAL;
    }

    for (const p of pipes) {
      p.x    -= gameSpeed * dt;
      p.phase += dt * 1.5;

      if (!p.scored && p.x + PIPE_WIDTH < player.x - player.r) {
        p.scored = true;
        score++;
        gameSpeed = BASE_SPEED + score * SPEED_RAMP * mods.speedMul;
        sfxScore();

        if (score % 10 === 0) {
          showFlash('🚀 Deployed to Azure', 2.2);
          goldShimmer = true;
          goldShimmerTimer = 1.0;
          spawnGoldShimmer(player.x, player.y);
        } else if (score % 5 === 0) {
          showFlash('⛩ Architecture Approved', 1.8);
          spawnGoldShimmer(player.x, player.y);
        } else {
          showFlash(FLASH_MSGS[score % FLASH_MSGS.length], 1.4);
        }

        if (score > hiScore) {
          hiScore = score;
          setHiScore(hiScore);
        }
      }
    }

    pipes = pipes.filter(p => p.x + PIPE_WIDTH > -10);

    if (player.y - player.r < TOP_BAR_H) {
      player.y = TOP_BAR_H + player.r;
      die();
      return;
    }
    if (player.y + player.r > BASE_H - GROUND_H) {
      player.y = BASE_H - GROUND_H - player.r;
      die();
      return;
    }

    for (const p of pipes) {
      const px = p.x, pw = PIPE_WIDTH;
      if (player.x + player.r > px && player.x - player.r < px + pw) {
        if (player.y - player.r < p.topH || player.y + player.r > p.botY) {
          if (!p.dodged && mods.shieldChance > 0 && Math.random() < mods.shieldChance) {
            p.dodged = true;
            neuralDodgeTimer = 0.6;
            showFlash('🤖 Neural Dodge!', 1.2);
            spawnNeuralDodgeParticles();
          } else if (!p.dodged) {
            die();
            return;
          }
        }
      }
    }
  }

  function die() {
    state = STATE.DEAD;
    player.dead = true;
    spawnExplosion(player.x, player.y);
    startShake(7, 0.45);
    sfxDie();
    deadErrorMsg = ERRORS[Math.floor(Math.random() * ERRORS.length)];
  }

  function updateDead(dt) {
    player.vy += GRAVITY * dt;
    player.y  += player.vy * dt;
    if (player.y + player.r > BASE_H - GROUND_H) {
      player.y = BASE_H - GROUND_H - player.r;
      player.vy = 0;
    }
  }

  function updateParticles(dt) {
    for (const p of particles) {
      p.x    += p.vx * dt;
      p.y    += p.vy * dt;
      p.vy   += 400 * dt;
      p.life -= p.decay * dt;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function updateTrail(dt) {
    for (const t of trailParticles) {
      t.x    += t.vx * dt;
      t.y    += t.vy * dt;
      t.vy   += 200 * dt;
      t.life -= t.decay * dt;
    }
    trailParticles = trailParticles.filter(t => t.life > 0);
  }

  // ─── Render ──────────────────────────────────────────────────────────────────
  function render() {
    const shakeX = shakeTmr < shakeDur
      ? (Math.random() - 0.5) * shakeAmt * 2 * (1 - shakeTmr / shakeDur)
      : 0;
    const shakeY = shakeTmr < shakeDur
      ? (Math.random() - 0.5) * shakeAmt * (1 - shakeTmr / shakeDur)
      : 0;

    ctx.save();
    ctx.translate(shakeX, shakeY);

    drawBg();
    drawMistyMountains();
    drawZenChars();
    drawSakuraPetals();

    if (state === STATE.PLAYING || state === STATE.DEAD) {
      drawPipes();
      drawTrail();
      drawPlayer();
      drawParticles();
    }

    drawGround();
    drawTopBar();
    drawHUD();

    if (flashTimer > 0) drawFlash();

    if (state === STATE.MENU)   drawMenu();
    if (state === STATE.SELECT) drawCharacterSelect();
    if (state === STATE.DEAD)   drawDead();

    ctx.restore();
  }

  function drawBg() {
    // Deep dark background gradient
    const grad = ctx.createLinearGradient(0, 0, 0, BASE_H);
    grad.addColorStop(0,   '#07070c');
    grad.addColorStop(0.5, '#0d0a12');
    grad.addColorStop(1,   '#110c0e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, BASE_W, BASE_H);
  }

  // Layered misty mountain silhouettes
  function drawMistyMountains() {
    const layers = [
      { alpha: 0.08, yBase: BASE_H - GROUND_H - 20,  peaks: [[0,110],[60,60],[120,90],[180,40],[240,70],[300,30],[360,65],[420,50],[480,80]] },
      { alpha: 0.06, yBase: BASE_H - GROUND_H - 50,  peaks: [[0,80],[80,45],[160,70],[240,25],[320,55],[400,35],[480,60]] },
      { alpha: 0.04, yBase: BASE_H - GROUND_H - 90,  peaks: [[0,50],[100,20],[200,40],[300,15],[400,30],[480,45]] },
    ];

    for (const layer of layers) {
      ctx.globalAlpha = layer.alpha;
      ctx.fillStyle = C.mauve;
      ctx.beginPath();
      ctx.moveTo(0, layer.yBase);
      for (const [px, py] of layer.peaks) {
        ctx.lineTo(px, layer.yBase - py);
      }
      ctx.lineTo(BASE_W, layer.yBase);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawZenChars() {
    for (const z of bgZenChars) {
      ctx.save();
      ctx.globalAlpha = z.alpha;
      ctx.translate(z.x, z.y);
      ctx.rotate(z.rot);
      ctx.font = `${z.size}px serif`;
      ctx.fillStyle = C.mauve;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(z.char, 0, 0);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }

  function drawSakuraPetals() {
    for (const p of sakuraPetals) {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      // Draw a simple petal shape
      ctx.fillStyle = '#e8a0b0';
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // ─── Torii Gate Pipes ────────────────────────────────────────────────────────
  function drawPipes() {
    for (const p of pipes) {
      drawToriiGate(p);
    }
  }

  function drawToriiGate(p) {
    const x = p.x, w = PIPE_WIDTH;
    const cx = x + w / 2;

    // Top gate (hangs from top)
    drawGatePillar(x, TOP_BAR_H, w, p.topH - TOP_BAR_H, true, p.phase);

    // Bottom gate (rises from bottom)
    drawGatePillar(x, p.botY, w, p.botH, false, p.phase + 0.5);

    // Gap label — rotated, in the center
    if (p.botY - p.topH > 20) {
      ctx.save();
      ctx.font = 'bold 6.5px Georgia, serif';
      ctx.fillStyle = C.mauve;
      ctx.globalAlpha = 0.7;
      ctx.textAlign = 'center';
      const labelY = p.topH + (p.botY - p.topH) / 2;
      ctx.translate(cx, labelY);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText(p.label, 0, 0);
      ctx.restore();
      ctx.textAlign = 'left';
    }
  }

  function drawGatePillar(x, y, w, h, isTop, phase) {
    if (h <= 0) return;

    const cx = x + w / 2;
    const pillarW = 10;
    const lx = x + 8;
    const rx = x + w - 8 - pillarW;

    // Background fill — torii dark
    const bgGrad = ctx.createLinearGradient(x, 0, x + w, 0);
    bgGrad.addColorStop(0,   '#130810');
    bgGrad.addColorStop(0.5, '#1e0d15');
    bgGrad.addColorStop(1,   '#130810');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(x, y, w, h);

    // Left pillar
    drawPillar(lx, y, pillarW, h, isTop, phase);
    // Right pillar
    drawPillar(rx, y, pillarW, h, isTop, phase + 0.8);

    // Crossbars (kasagi / nuki) at open end
    const barY = isTop ? y + h - 4 : y;
    const barThick = 5;

    // Outer kasagi (top beam)
    const kasagiGrad = ctx.createLinearGradient(x, barY, x, barY + barThick);
    kasagiGrad.addColorStop(0, '#9e2a60');
    kasagiGrad.addColorStop(1, '#6b1840');
    ctx.fillStyle = kasagiGrad;

    // Bar extends slightly past pillars
    ctx.beginPath();
    ctx.rect(x - 3, isTop ? y + h - barThick - 3 : y + 1, w + 6, barThick);
    ctx.fill();

    // Nuki (lower beam)
    ctx.fillStyle = '#6b1840';
    ctx.fillRect(x + 4, isTop ? y + h - barThick - 10 : y + 8, w - 8, 3);

    // Glowing top edge accent
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.6 + 0.3 * Math.sin(phase);
    ctx.beginPath();
    ctx.moveTo(x - 3, isTop ? y + h - barThick - 3 : y + 1);
    ctx.lineTo(x + w + 3, isTop ? y + h - barThick - 3 : y + 1);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Border lines on pillars
    ctx.strokeStyle = '#5a1636';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x, y, w, h);
  }

  function drawPillar(px, py, pw, ph, isTop, phase) {
    // Pillar gradient
    const grad = ctx.createLinearGradient(px, 0, px + pw, 0);
    grad.addColorStop(0,    '#6b1840');
    grad.addColorStop(0.3,  '#9e2a60');
    grad.addColorStop(0.7,  '#9e2a60');
    grad.addColorStop(1,    '#5a1330');
    ctx.fillStyle = grad;
    ctx.fillRect(px, py, pw, ph);

    // Subtle vertical grain lines
    ctx.strokeStyle = '#7a1f4e';
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.4;
    for (let i = 2; i < pw - 2; i += 3) {
      ctx.beginPath();
      ctx.moveTo(px + i, py);
      ctx.lineTo(px + i, py + ph);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Small code glyphs on pillar
    const glyphCount = Math.floor(ph / 22);
    ctx.font = '7px monospace';
    ctx.fillStyle = C.burgundy;
    ctx.globalAlpha = 0.3;
    ctx.textAlign = 'center';
    const glyphs = ['</', '/>', '{}', '[];', '=>', '::'];
    for (let i = 0; i < glyphCount; i++) {
      const gy = isTop ? py + ph - 12 - i * 22 : py + 12 + i * 22;
      if (gy > py && gy < py + ph - 4) {
        ctx.fillText(glyphs[i % glyphs.length], px + pw / 2, gy);
      }
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // ─── Player: Ensō Circle / Photo ─────────────────────────────────────────────
  function drawPlayer() {
    const x = player.x;
    const bob = player.dead ? 0 : Math.sin(bobPhase) * 2.5;
    const y = player.y + bob;

    ctx.save();

    // Neural dodge phase-through effect
    if (neuralDodgeTimer > 0) {
      const phaseAlpha = 0.35 + 0.35 * Math.sin(neuralDodgeTimer * 30);
      ctx.globalAlpha = phaseAlpha;
      // Cyan glow during phase
      ctx.shadowColor = '#00BCF2';
      ctx.shadowBlur = 22;
    }

    const tilt = player.dead
      ? Math.PI / 2
      : Math.max(-0.45, Math.min(0.75, player.vy / 520));
    ctx.translate(x, y);
    ctx.rotate(tilt);

    const r = player.r;
    const color = getPlayerColor();
    const emp = selectedEmployee;

    if (emp && emp.imgLoaded && emp.imgEl) {
      // Outer glow
      if (!player.dead) {
        ctx.shadowColor = color;
        ctx.shadowBlur = 18;
      }

      // Ensō ring as border
      drawEnsoCircle(0, 0, r + 3, player.dead, color);
      ctx.shadowBlur = 0;

      // Circular photo crop
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.clip();
      if (player.dead) {
        ctx.filter = 'grayscale(80%) brightness(0.5)';
      }
      ctx.drawImage(emp.imgEl, -r, -r, r * 2, r * 2);
      ctx.filter = 'none';
      ctx.restore();
    } else {
      // Fallback: original ensō
      if (!player.dead) {
        ctx.shadowColor = color;
        ctx.shadowBlur = 18;
      }
      drawEnsoCircle(0, 0, r, player.dead, color);
      ctx.shadowBlur = 0;
    }

    ctx.restore();
  }

  function drawEnsoCircle(cx, cy, r, broken, color) {
    const strokeColor = color || C.burgundy;

    // The ensō: a brushstroke circle, thick and slightly uneven
    const gapStart = broken ? -0.1 : 0.18;   // gap where brush lifts
    const gapEnd   = broken ? 2.8  : 0.42;
    const startAngle = gapEnd;
    const endAngle   = Math.PI * 2 + gapStart;

    // Outer stroke — thick, ink-like
    ctx.beginPath();
    ctx.arc(cx, cy, r + 1.5, startAngle, endAngle);
    ctx.strokeStyle = '#0a0008';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Main stroke — personal color brushstroke
    ctx.beginPath();
    ctx.arc(cx, cy, r, startAngle, endAngle);

    // Gradient along the stroke — lighter at ends, darker in middle
    const grad = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
    // Lighten and darken the color for gradient
    grad.addColorStop(0,   lightenColor(strokeColor, 30));
    grad.addColorStop(0.3, lightenColor(strokeColor, 10));
    grad.addColorStop(0.6, strokeColor);
    grad.addColorStop(1,   darkenColor(strokeColor, 20));
    ctx.strokeStyle = grad;
    ctx.lineWidth = broken ? 4 : 5;
    ctx.stroke();

    // Brush texture — a slightly thinner inner stroke for depth
    ctx.beginPath();
    ctx.arc(cx, cy, r - 1, startAngle + 0.1, endAngle - 0.1);
    ctx.strokeStyle = 'rgba(196, 166, 181, 0.18)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Brush start/end tips — tapered points
    if (!broken) {
      // Start tip
      const sx = cx + Math.cos(startAngle) * r;
      const sy = cy + Math.sin(startAngle) * r;
      ctx.beginPath();
      ctx.arc(sx, sy, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = lightenColor(strokeColor, 20);
      ctx.fill();

      // End tip
      const ex = cx + Math.cos(endAngle) * r;
      const ey = cy + Math.sin(endAngle) * r;
      ctx.beginPath();
      ctx.arc(ex, ey, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = strokeColor;
      ctx.fill();
    }

    // Inner void — empty center, zen emptiness
    if (!broken) {
      ctx.beginPath();
      ctx.arc(cx, cy, r - 6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(10, 10, 15, 0.0)';
      ctx.fill();
    }
  }

  // Color utilities for gradient variation
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return [r, g, b];
  }

  function lightenColor(hex, amount) {
    try {
      const [r, g, b] = hexToRgb(hex);
      return `rgb(${Math.min(255,r+amount)},${Math.min(255,g+amount)},${Math.min(255,b+amount)})`;
    } catch(e) { return hex; }
  }

  function darkenColor(hex, amount) {
    try {
      const [r, g, b] = hexToRgb(hex);
      return `rgb(${Math.max(0,r-amount)},${Math.max(0,g-amount)},${Math.max(0,b-amount)})`;
    } catch(e) { return hex; }
  }

  // ─── Ink Trail ───────────────────────────────────────────────────────────────
  function drawTrail() {
    for (const t of trailParticles) {
      ctx.save();
      ctx.globalAlpha = t.life * 0.75;
      ctx.fillStyle = t.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r * t.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ─── Particles ───────────────────────────────────────────────────────────────
  function drawParticles() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * Math.max(0, p.life), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ─── Ground: Karesansui Rock Garden ──────────────────────────────────────────
  function drawGround() {
    const y = BASE_H - GROUND_H;

    // Ground base
    const ggrad = ctx.createLinearGradient(0, y, 0, BASE_H);
    ggrad.addColorStop(0, '#1a1018');
    ggrad.addColorStop(1, '#0e0a0d');
    ctx.fillStyle = ggrad;
    ctx.fillRect(0, y, BASE_W, GROUND_H);

    // Top border — subtle burgundy line
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(BASE_W, y);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Raked sand ripple lines (karesansui)
    ctx.strokeStyle = '#2a1a24';
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.55;
    const rippleSpacing = 5;
    const rippleCount = Math.ceil(GROUND_H / rippleSpacing);
    for (let i = 0; i < rippleCount; i++) {
      const ry = y + 6 + i * rippleSpacing;
      ctx.beginPath();
      // Wavy rake lines with offset scroll
      for (let sx = 0; sx <= BASE_W; sx += 2) {
        const waveY = ry + Math.sin((sx + sandOffset * 3) / 18) * 1.2;
        if (sx === 0) ctx.moveTo(sx, waveY);
        else ctx.lineTo(sx, waveY);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Branding: "ensō.no" subtle text
    ctx.font = '9px Georgia, serif';
    ctx.fillStyle = C.dim;
    ctx.globalAlpha = 0.4;
    ctx.textAlign = 'center';
    ctx.fillText('ensō.no', BASE_W / 2, y + GROUND_H - 7);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // ─── Top Bar ──────────────────────────────────────────────────────────────────
  function drawTopBar() {
    // Dark bar
    const barGrad = ctx.createLinearGradient(0, 0, 0, TOP_BAR_H);
    barGrad.addColorStop(0, '#100810');
    barGrad.addColorStop(1, '#0d0610');
    ctx.fillStyle = barGrad;
    ctx.fillRect(0, 0, BASE_W, TOP_BAR_H);

    // Bottom border line
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.35;
    ctx.beginPath();
    ctx.moveTo(0, TOP_BAR_H);
    ctx.lineTo(BASE_W, TOP_BAR_H);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Ensō title
    ctx.font = 'bold 13px Georgia, serif';
    ctx.fillStyle = C.mauve;
    ctx.fillText('円', 10, TOP_BAR_H - 9);

    ctx.font = '11px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.globalAlpha = 0.85;
    ctx.fillText('Ensō Flow', 30, TOP_BAR_H - 9);
    ctx.globalAlpha = 1;

    // Tech stack subtle tags
    const tags = ['C#', '.NET', 'React', 'Azure'];
    let tx = BASE_W - 8;
    ctx.font = '8px Georgia, serif';
    for (let i = tags.length - 1; i >= 0; i--) {
      const tw = ctx.measureText(tags[i]).width;
      tx -= tw + 2;
      ctx.fillStyle = C.dim;
      ctx.globalAlpha = 0.5;
      ctx.fillText(tags[i], tx, TOP_BAR_H - 10);
      ctx.globalAlpha = 1;
      if (i > 0) {
        tx -= 8;
        ctx.fillStyle = C.burgundy;
        ctx.globalAlpha = 0.3;
        ctx.fillText('|', tx, TOP_BAR_H - 10);
        ctx.globalAlpha = 1;
        tx -= 2;
      }
    }
  }

          ctx.globalAlpha = 1;
        }
      } else {
        ctx.font = '9px Georgia, serif';
        ctx.fillStyle = emp.color;
        ctx.globalAlpha = 0.75;
        ctx.fillText(`Consultant: ${emp.name}`, 10, TOP_BAR_H + 50);

  // ─── Menu Screen ──────────────────────────────────────────────────────────────
  function drawMenu() {

  // ─── Character Select Screen ─────────────────────────────────────────────────
  function drawCharacterSelect() {
    // Dim overlay over the background
    ctx.fillStyle = 'rgba(7, 5, 10, 0.82)';
    ctx.fillRect(0, TOP_BAR_H, BASE_W, BASE_H - TOP_BAR_H - GROUND_H);

    const cx = BASE_W / 2;

    ctx.textAlign = 'center';

    // Header
    ctx.font = 'bold 15px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.shadowColor = C.burgundy;
    ctx.shadowBlur = 10;
    ctx.fillText('Choose Your Consultant', cx, TOP_BAR_H + 22);
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.font = '9px Georgia, serif';
    ctx.fillStyle = C.dim;
    ctx.globalAlpha = 0.7;
    ctx.fillText('Arrow keys · Scroll · Tap to select', cx, TOP_BAR_H + 36);
    ctx.globalAlpha = 1;

    // Clip grid to visible area
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, GRID_AREA_TOP, BASE_W, GRID_AREA_BOTTOM - GRID_AREA_TOP);
    ctx.clip();

    for (let i = 0; i < EMPLOYEES.length; i++) {
      const emp = EMPLOYEES[i];
      const rect = cardRect(i);

      // Skip cards fully outside visible region
      if (rect.y + rect.h < GRID_AREA_TOP || rect.y > GRID_AREA_BOTTOM) continue;

      const isHovered  = i === selectHoverIdx;
      const isFocused  = i === selectFocusIdx;
      const isActive   = isHovered || isFocused;

      drawEmployeeCard(emp, rect.x, rect.y, rect.w, rect.h, isActive, isFocused);
    }

    ctx.restore();

    // Scroll indicators
    drawScrollIndicators();

    // Skill panel for hovered/focused card
    const previewIdx = selectHoverIdx >= 0 ? selectHoverIdx : selectFocusIdx;
    if (previewIdx >= 0 && previewIdx < EMPLOYEES.length) {
      drawSkillPanel(EMPLOYEES[previewIdx]);
    }

    ctx.textAlign = 'left';
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawEmployeeCard(emp, x, y, w, h, isActive, isFocused) {
    const color = emp.color;

    // Card background
    const bgAlpha = isActive ? 0.22 : 0.10;
    ctx.fillStyle = `rgba(20,14,22,${bgAlpha})`;
    roundRect(x, y, w, h, 6);
    ctx.fill();

    // Border glow
    const borderAlpha = isFocused ? 0.95 : (isActive ? 0.7 : 0.22);
    const borderWidth = isFocused ? 1.5 : (isActive ? 1.2 : 0.7);
    ctx.strokeStyle = color;
    ctx.lineWidth = borderWidth;
    ctx.globalAlpha = borderAlpha;
    roundRect(x, y, w, h, 6);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Outer glow for active cards
    if (isActive) {
      ctx.shadowColor = color;
      ctx.shadowBlur = isFocused ? 14 : 8;
      ctx.strokeStyle = color;
      ctx.lineWidth = borderWidth;
      ctx.globalAlpha = 0.3;
      roundRect(x, y, w, h, 6);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    // Photo / ensō preview
    const photoR = 36;
    const photoX = x + w / 2;
    const photoY = y + photoR + 8;

    if (emp.imgLoaded && emp.imgEl) {
      ctx.save();
      // Clipping circle for photo
      ctx.beginPath();
      ctx.arc(photoX, photoY, photoR, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(emp.imgEl, photoX - photoR, photoY - photoR, photoR * 2, photoR * 2);
      ctx.restore();

      // Color border ring
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = isActive ? 10 : 4;
      ctx.strokeStyle = color;
      ctx.lineWidth = isActive ? 2 : 1.2;
      ctx.globalAlpha = isActive ? 1.0 : 0.6;
      ctx.beginPath();
      ctx.arc(photoX, photoY, photoR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      const ensoR = 12;
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = isActive ? 10 : 5;
      drawEnsoCircle(photoX, photoY, ensoR, false, color);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // Name
    ctx.font = `bold 8px Georgia, serif`;
    ctx.fillStyle = C.cream;
    ctx.textAlign = 'center';
    ctx.globalAlpha = isActive ? 1.0 : 0.88;
    ctx.fillText(emp.name, x + w / 2, photoY + photoR + 10);
    ctx.globalAlpha = 1;

    // Role
    ctx.font = '7px Georgia, serif';
    ctx.fillStyle = color;
    ctx.globalAlpha = isActive ? 0.9 : 0.65;
    ctx.fillText(emp.role, x + w / 2, photoY + photoR + 21);
    ctx.globalAlpha = 1;

    // Tech
    ctx.font = '6.5px Georgia, serif';
    ctx.fillStyle = C.dim;
    ctx.globalAlpha = isActive ? 0.8 : 0.5;
    ctx.fillText(emp.tech, x + w / 2, photoY + photoR + 32);
    ctx.globalAlpha = 1;

    ctx.textAlign = 'left';
  }

  function drawScrollIndicators() {
    const cx = BASE_W / 2;
    const canScrollUp   = selectScrollY > 0;
    const canScrollDown = selectScrollY < maxScrollY();

    if (canScrollUp) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = '10px Georgia, serif';
      ctx.fillStyle = C.mauve;
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
      ctx.globalAlpha = 0.4 + 0.4 * pulse;
      ctx.fillText('▲', cx, GRID_AREA_TOP + 10);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    if (canScrollDown) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = '10px Georgia, serif';
      ctx.fillStyle = C.mauve;
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
      ctx.globalAlpha = 0.4 + 0.4 * pulse;
      ctx.fillText('▼', cx, GRID_AREA_BOTTOM + 14);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // ─── Skill Panel (Select Screen) ─────────────────────────────────────────────
  function drawSkillBar(x, y, w, h, value, maxValue, color) {
    // Background track
    ctx.fillStyle = 'rgba(60,40,60,0.5)';
    roundRect(x, y, w, h, h / 2);
    ctx.fill();

    // Fill
    const fillW = Math.max(0, (value / maxValue) * w);
    if (fillW > 0) {
      ctx.save();
      ctx.beginPath();
      roundRect(x, y, fillW, h, h / 2);
      ctx.clip();
      const barGrad = ctx.createLinearGradient(x, 0, x + w, 0);
      barGrad.addColorStop(0, color);
      barGrad.addColorStop(1, lightenColor(color, 30));
      ctx.fillStyle = barGrad;
      ctx.fillRect(x, y, fillW, h);
      ctx.restore();
    }
  }

  function drawSkillPanel(emp) {
    const skillDef = ROLE_SKILLS[emp.role];
    if (!skillDef) return;

    const panelY = GRID_AREA_BOTTOM + 4;
    const panelH = BASE_H - GROUND_H - panelY - 2;
    if (panelH < 16) return;

    const panelX = 8;
    const panelW = BASE_W - 16;
    const cx = panelX + panelW / 2;

    // Panel background
    ctx.fillStyle = 'rgba(14,8,18,0.85)';
    roundRect(panelX, panelY, panelW, panelH, 5);
    ctx.fill();

    ctx.strokeStyle = emp.color;
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.4;
    roundRect(panelX, panelY, panelW, panelH, 5);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Role icon + title
    ctx.textAlign = 'left';
    const textY = panelY + 13;
    ctx.font = 'bold 9px Georgia, serif';
    ctx.fillStyle = emp.color;
    ctx.fillText(`${skillDef.icon} ${skillDef.title}`, panelX + 8, textY);

    // Skill bars — arranged horizontally
    const skills = skillDef.skills;
    const skillNames = Object.keys(skills);
    const barW = 52;
    const barH = 4;
    const barGap = 28;
    let bx = panelX + 8;
    const barY = panelY + 20;

    const skillLabelColors = { agility: '#7df5a0', resilience: '#7db8f5', velocity: '#f5d07d' };
    for (const name of skillNames) {
      const val = skills[name];
      ctx.font = '6.5px Georgia, serif';
      ctx.fillStyle = C.dim;
      ctx.globalAlpha = 0.8;
      ctx.fillText(name.charAt(0).toUpperCase() + name.slice(1), bx, barY);
      ctx.globalAlpha = 1;

      drawSkillBar(bx, barY + 3, barW, barH, val, 10, skillLabelColors[name] || emp.color);

      ctx.font = '6px monospace';
      ctx.fillStyle = C.dim;
      ctx.globalAlpha = 0.7;
      ctx.fillText(`${val}/10`, bx + barW + 3, barY + barH + 3);
      ctx.globalAlpha = 1;

      bx += barW + barGap;
    }

    // Passive description
    ctx.font = '7px Georgia, serif';
    ctx.fillStyle = C.mauve;
    ctx.globalAlpha = 0.75;
    ctx.textAlign = 'right';
    ctx.fillText(skillDef.passive, panelX + panelW - 8, textY);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // ─── Death Screen ─────────────────────────────────────────────────────────────
  function drawDead() {
    // Dark overlay with slight burgundy tint
    ctx.fillStyle = 'rgba(8, 2, 6, 0.82)';
    ctx.fillRect(0, TOP_BAR_H, BASE_W, BASE_H - TOP_BAR_H - GROUND_H);

    const cx = BASE_W / 2;
    const cy = BASE_H / 2 - 15;

    ctx.textAlign = 'center';

    // Broken ensō / photo — large, in player color, desaturated
    ctx.save();
    ctx.translate(cx, cy - 88);
    ctx.shadowColor = getPlayerColor();
    ctx.shadowBlur = 20;
    drawEnsoCircle(0, 0, 42, true, getPlayerColor());
    ctx.shadowBlur = 0;
    ctx.restore();

    if (selectedEmployee && selectedEmployee.imgLoaded && selectedEmployee.imgEl) {
      const deathPhotoR = 30;
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.filter = 'grayscale(70%) brightness(0.55)';
      ctx.beginPath();
      ctx.arc(cx, cy - 88, deathPhotoR, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(selectedEmployee.imgEl, cx - deathPhotoR, cy - 88 - deathPhotoR, deathPhotoR * 2, deathPhotoR * 2);
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = selectedEmployee.color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.arc(cx, cy - 88, deathPhotoR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // "Sprint Retrospective" header — personalised if character selected
    const retroTitle = selectedEmployee
      ? `${selectedEmployee.name}'s Sprint Retrospective`
      : 'Sprint Retrospective';
    ctx.font = 'bold 13px Georgia, serif';
    ctx.fillStyle = C.mauve;
    ctx.shadowColor = C.burgundy;
    ctx.shadowBlur = 8;
    ctx.fillText(retroTitle, cx, cy - 30);
    ctx.shadowBlur = 0;

    // Error message box
    const bx = cx - 160, by = cy - 22, bw = 320, bh = 44;
    ctx.fillStyle = 'rgba(139, 34, 82, 0.08)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.4;
    ctx.strokeRect(bx, by, bw, bh);
    ctx.globalAlpha = 1;

    ctx.font = '10px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.globalAlpha = 0.8;
    const errLines = wrapText(deadErrorMsg, 46);
    for (let i = 0; i < errLines.length; i++) {
      ctx.fillText(errLines[i], cx, by + 16 + i * 14);
    }
    ctx.globalAlpha = 1;

    // Divider
    ctx.strokeStyle = C.burgundy;
    ctx.lineWidth = 0.6;
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.moveTo(cx - 100, cy + 30);
    ctx.lineTo(cx + 100, cy + 30);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Role skill bars on death screen
    if (selectedEmployee) {
      const skillDef = ROLE_SKILLS[selectedEmployee.role];
      if (skillDef) {
        const skillY = cy + 42;

        // Role icon + title
        ctx.font = 'bold 9px Georgia, serif';
        ctx.fillStyle = selectedEmployee.color;
        ctx.fillText(`${skillDef.icon} ${skillDef.title}`, cx, skillY);

        const skills = skillDef.skills;
        const skillNames = Object.keys(skills);
        const barW = 60;
        const barH = 5;
        const totalBarsW = skillNames.length * barW + (skillNames.length - 1) * 20;
        let sbx = cx - totalBarsW / 2;
        const sbY = skillY + 6;
        const skillLabelColors = { agility: '#7df5a0', resilience: '#7db8f5', velocity: '#f5d07d' };

        for (const name of skillNames) {
          const val = skills[name];

          ctx.font = '6.5px Georgia, serif';
          ctx.fillStyle = C.dim;
          ctx.globalAlpha = 0.8;
          ctx.textAlign = 'left';
          ctx.fillText(name.charAt(0).toUpperCase() + name.slice(1), sbx, sbY);
          ctx.globalAlpha = 1;

          drawSkillBar(sbx, sbY + 3, barW, barH, val, 10, skillLabelColors[name] || selectedEmployee.color);

          ctx.font = '6px monospace';
          ctx.fillStyle = C.dim;
          ctx.globalAlpha = 0.6;
          ctx.fillText(`${val}`, sbx + barW + 3, sbY + barH + 3);
          ctx.globalAlpha = 1;

          sbx += barW + 20;
        }

        ctx.font = '7px Georgia, serif';
        ctx.fillStyle = C.mauve;
        ctx.globalAlpha = 0.65;
        ctx.textAlign = 'center';
        ctx.fillText(skillDef.passive, cx, sbY + barH + 16);
        ctx.globalAlpha = 1;
      }
    }

    // Sprint metrics
    ctx.font = 'bold 12px Georgia, serif';
    ctx.fillStyle = C.soft_white;
    ctx.fillText(`Sprints Delivered:  ${score}`, cx, cy + 98);
    ctx.fillStyle = C.gold;
    ctx.fillText(`Personal Best:      ${hiScore}`, cx, cy + 116);

    // New record
    if (score >= hiScore && score > 0) {
      ctx.font = 'bold 11px Georgia, serif';
      ctx.fillStyle = C.gold;
      ctx.shadowColor = C.gold;
      ctx.shadowBlur = 8;
      ctx.fillText('✦ New Personal Best ✦', cx, cy + 134);
      ctx.shadowBlur = 0;
    }

    // Restart prompt
    const pulse = 0.65 + 0.35 * Math.sin(Date.now() / 450);
    ctx.globalAlpha = pulse;
    ctx.font = 'bold 13px Georgia, serif';
    ctx.fillStyle = C.cream;
    ctx.shadowColor = C.mauve;
    ctx.shadowBlur = 8;
    ctx.fillText('— Return to Stillness —', cx, cy + 158);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    ctx.font = '9px Georgia, serif';
    ctx.fillStyle = C.dim;
    ctx.globalAlpha = 0.6;
    ctx.fillText('press Space or tap to continue', cx, cy + 174);
    ctx.globalAlpha = 1;

    ctx.textAlign = 'left';
  }

  function wrapText(text, maxChars) {
    const words = text.split(' ');
    const lines = [];
    let current = '';
    for (const word of words) {
      if ((current + ' ' + word).trim().length > maxChars) {
        lines.push(current.trim());
        current = word;
      } else {
        current = (current + ' ' + word).trim();
      }
    }
    if (current) lines.push(current);
    return lines;
  }

  // ─── Start ───────────────────────────────────────────────────────────────────
  requestAnimationFrame(ts => {
    lastTime = ts;
    requestAnimationFrame(update);
  });

})();
</script>
